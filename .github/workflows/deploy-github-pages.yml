name: Deploy GitHub Pages

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Имя artifact из host-ci
        required: false
        type: string
        default: deploy-bundle
      jekyll:
        description: Собрать Jekyll (index.md, _config.yml) перед публикацией
        required: false
        type: boolean
        default: false
      source_path:
        description: Каталог относительно workspace после download-artifact
        required: false
        type: string
        default: public

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.source_path }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build Jekyll site
        if: ${{ inputs.jekyll }}
        uses: actions/jekyll-build-pages@v1
        with:
          destination: _site
          source: ${{ inputs.source_path }}

      - name: Upload Pages artifact (Jekyll)
        if: ${{ inputs.jekyll }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Upload Pages artifact (static)
        if: ${{ !inputs.jekyll }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ inputs.source_path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
