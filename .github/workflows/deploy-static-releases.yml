name: Deploy static releases

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Имя artifact из host-ci
        required: false
        type: string
        default: deploy-bundle
      scp_source:
        description: source для appleboy/scp-action (glob от корня workspace)
        required: true
        type: string
    secrets:
      DEPLOY_SERVER_HOST:
        required: true
      DEPLOY_SERVER_USERNAME:
        required: true
      DEPLOY_SERVER_PASSWORD:
        required: true
      DEPLOY_SERVER_TARGET:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}

      - name: Copy to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_SERVER_HOST }}
          username: ${{ secrets.DEPLOY_SERVER_USERNAME }}
          password: ${{ secrets.DEPLOY_SERVER_PASSWORD }}
          source: ${{ inputs.scp_source }}
          target: ${{ secrets.DEPLOY_SERVER_TARGET }}/new

      - name: Modify server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SERVER_HOST }}
          username: ${{ secrets.DEPLOY_SERVER_USERNAME }}
          password: ${{ secrets.DEPLOY_SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            BASE_DIR=${{ secrets.DEPLOY_SERVER_TARGET }}
            RELEASES_DIR=$BASE_DIR/releases
            NEW_RELEASE_DIR=$RELEASES_DIR/$(date +%s)

            mkdir -p $RELEASES_DIR

            if [ ! -d "$BASE_DIR/new" ]; then
              echo "ERROR: $BASE_DIR/new not found"
              exit 1
            fi

            mv $BASE_DIR/new $NEW_RELEASE_DIR

            # переключаем только ПОСЛЕ успеха
            ln -sfn $NEW_RELEASE_DIR $BASE_DIR/current

            # cleanup старых релизов (кроме текущего и последних 2)
            cd $RELEASES_DIR
            ls -dt */ | tail -n +4 | xargs -r rm -rf
