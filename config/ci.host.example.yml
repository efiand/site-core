# Шаблон `.github/workflows/ci.yml` хоста — шаг 3 миграции на site-core.
# Требует опубликованный site-core на GitHub (`uses:` читает YAML из git ref, не из node_modules).
# Заменить <org> и X.Y.Z на репозиторий и тег site-core.
#
# До шага 3 — self-contained `ci.yml` в репозитории consumer-проекта.
# После шага 3 — thin caller ниже (lint/test/deploy через reusable workflows site-core).
#
# Commit keywords (message): `[skip` — skip CI; `[no-deploy]`, `[WIP]` — skip deploy only.
# Deploy if: !contains(…, '[no-deploy]') && !contains(…, '[WIP]')

# --- VPS: scp/ssh (deploy-static-releases.yml) ---

name: CI

on:
  push:
    branches:
      - main

jobs:
  ci:
    if: ${{ !contains(github.event.head_commit.message, '[skip') }}
    uses: <org>/site-core/.github/workflows/host-ci.yml@X.Y.Z
    with:
      test_command: npm test
      artifact_paths: |
        app/__/
        public/
        tools/prod/
    secrets: inherit

  deploy:
    needs: ci
    if: ${{ !contains(github.event.head_commit.message, '[no-deploy]') && !contains(github.event.head_commit.message, '[WIP]') }}
    uses: <org>/site-core/.github/workflows/deploy-static-releases.yml@X.Y.Z
    with:
      scp_source: app/__/*,public/*,tools/prod/*
    secrets: inherit

